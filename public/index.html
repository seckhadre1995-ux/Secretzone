<html lang="fr">
<head>
<meta charset="UTF-8">

<meta name="description" content="Confesse-toi anonymement. Sans filtre. Communauté honnête.">

<meta property="og:description" content="Découvre les confessions les plus sombres et drôles. 100% anonyme.">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808; --bg2: #0f0f0f; --bg3: #161616;
  --violet: #6A00FF; --violet2: #8B30FF;
  --rose: #FF00AA; --rose2: #FF3DBF;
  --cyan: #00F5FF; --white: #F0F0F0;
  --muted: #555; --muted2: #333;
  --gold: #FFD700;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'Space Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--white); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.4;
}

/* HEADER & HERO */
header { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: rgba(8,8,8,0.88); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(106,0,255,0.2); }
.logo { font-family: var(--font-display); font-size: 2rem; letter-spacing: 2px; background: linear-gradient(90deg, var(--violet), var(--rose)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
.logo span { color: var(--cyan); -webkit-text-fill-color: var(--cyan); }
.header-actions { display: flex; gap: 10px; }
.btn-confess { background: linear-gradient(135deg, var(--violet), var(--rose)); border: none; color: white; padding: 10px 20px; border-radius: 50px; font-weight: 700; font-size: 0.85rem; cursor: pointer; box-shadow: 0 0 20px rgba(106,0,255,0.4); }
.btn-premium { background: transparent; border: 1px solid rgba(255,215,0,0.5); color: #FFD700; padding: 9px 16px; border-radius: 50px; font-weight: 600; font-size: 0.8rem; cursor: pointer; }

.hero { text-align: center; padding: 60px 24px 40px; position: relative; overflow: hidden; }
.hero-eyebrow { font-family: var(--font-mono); font-size: 0.7rem; color: var(--rose); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; }
.hero h1 { font-family: var(--font-display); font-size: clamp(3rem, 10vw, 6rem); line-height: 0.9; margin-bottom: 20px; }
.hero h1 em { background: linear-gradient(90deg, var(--violet), var(--rose)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-style: normal; }
.hero p { color: rgba(240,240,240,0.6); max-width: 400px; margin: 0 auto 32px; line-height: 1.6; }

/* RECHERCHE ET TRI (Nouveauté UX) */
.toolbar { padding: 0 16px 20px; max-width: 680px; margin: 0 auto; display: flex; gap: 10px; flex-wrap: wrap; }
.search-bar { flex: 1; min-width: 200px; background: var(--bg2); border: 1px solid var(--muted2); padding: 10px 16px; border-radius: 50px; color: var(--white); font-family: var(--font-body); outline: none; }
.search-bar:focus { border-color: var(--violet); }
.sort-select { background: var(--bg2); border: 1px solid var(--muted2); padding: 10px 16px; border-radius: 50px; color: var(--white); font-family: var(--font-body); outline: none; cursor: pointer; }

/* CATEGORIES */
.categories { padding: 0 16px 20px; max-width: 680px; margin: 0 auto; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.cat-btn { flex-shrink: 0; background: var(--bg3); border: 1px solid var(--muted2); color: rgba(240,240,240,0.6); padding: 8px 18px; border-radius: 50px; font-size: 0.8rem; cursor: pointer; }
.cat-btn.active { background: linear-gradient(135deg, rgba(106,0,255,0.3), rgba(255,0,170,0.2)); border-color: var(--violet); color: var(--white); }

/* CARDS */
.confessions-feed { padding: 0 16px; display: flex; flex-direction: column; gap: 16px; max-width: 680px; margin: 0 auto; }
.confession-card { background: var(--bg2); border: 1px solid var(--muted2); border-radius: 20px; padding: 24px; position: relative; overflow: hidden; animation: fadeIn 0.5s ease both; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-meta { display: flex; align-items: center; gap: 10px; }
.anon-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.anon-info { display: flex; flex-direction: column; }
.anon-name { font-size: 0.8rem; font-weight: 600; color: rgba(240,240,240,0.8); }
.anon-time { font-size: 0.65rem; color: var(--muted); font-family: var(--font-mono); }
.card-category { font-size: 0.65rem; padding: 3px 10px; border-radius: 50px; font-weight: 600; text-transform: uppercase; }

.cat-amour { background: rgba(255,100,100,0.15); color: #FF6464; border: 1px solid rgba(255,100,100,0.3); }
.cat-dark { background: rgba(150,50,255,0.15); color: #B264FF; border: 1px solid rgba(150,50,255,0.3); }
.cat-drole { background: rgba(100,255,100,0.1); color: #64FF64; border: 1px solid rgba(100,255,100,0.3); }
.cat-18 { background: rgba(255,0,0,0.15); color: #FF3333; border: 1px solid rgba(255,0,0,0.4); }

.confession-text { font-size: 0.95rem; line-height: 1.8; color: rgba(240,240,240,0.85); font-weight: 300; margin-bottom: 20px; }

/* EFFET CONTENU PREMIUM 18+ */
.blurred-content { filter: blur(6px); user-select: none; pointer-events: none; }
.locked-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(15,15,15,0.7); backdrop-filter: blur(2px); border-radius: 20px; z-index: 10; }
.locked-overlay span { font-size: 2rem; margin-bottom: 10px; }
.locked-overlay button { background: var(--gold); border: none; padding: 8px 16px; border-radius: 50px; font-weight: bold; cursor: pointer; }

/* ACTIONS & VOTES */
.vote-section { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; }
.vote-question { font-size: 0.75rem; color: rgba(240,240,240,0.5); flex: 1; font-style: italic; }
.vote-btn { padding: 7px 14px; border-radius: 50px; border: 1px solid; font-size: 0.75rem; font-weight: 700; cursor: pointer; background: transparent; }
.vote-right { border-color: rgba(100,255,100,0.3); color: #64FF64; }
.vote-wrong { border-color: rgba(255,80,80,0.3); color: #FF6464; }
.vote-btn.voted { background: rgba(255,255,255,0.1); opacity: 0.5; cursor: not-allowed; }

.card-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.action-btn { display: flex; align-items: center; gap: 5px; background: var(--bg3); border: 1px solid var(--muted2); color: rgba(240,240,240,0.6); padding: 8px 12px; border-radius: 50px; font-size: 0.72rem; cursor: pointer; }
.action-btn.liked { border-color: var(--rose); color: var(--rose); background: rgba(255,0,170,0.08); }
.btn-report { margin-left: auto; color: var(--muted); background: transparent; border: none; font-size: 0.7rem; cursor: pointer; text-decoration: underline; }

/* COMMENTS */
.comments-section { display: none; margin-top: 16px; border-top: 1px solid var(--muted2); padding-top: 16px; }
.comments-section.visible { display: block; }
.comment-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.comment-input { flex: 1; background: var(--bg3); border: 1px solid var(--muted2); border-radius: 20px; padding: 10px 16px; color: var(--white); outline: none; }
.comment-submit { background: var(--violet); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }

/* MODALS & COOKIES */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.35s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { width: 100%; max-width: 680px; background: var(--bg2); border: 1px solid rgba(106,0,255,0.4); border-radius: 28px 28px 0 0; padding: 32px 24px 40px; transform: translateY(100%); transition: transform 0.4s; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; background: var(--muted2); border-radius: 2px; margin: 0 auto 24px; }
.form-group { margin-bottom: 20px; }
.form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--muted2); border-radius: 16px; padding: 16px; color: var(--white); font-family: var(--font-body); resize: none; outline: none; min-height: 130px; }
.cat-select { display: flex; gap: 8px; flex-wrap: wrap; }
.cat-option { padding: 8px 16px; border-radius: 50px; border: 1px solid var(--muted2); background: var(--bg3); color: rgba(240,240,240,0.5); font-size: 0.8rem; cursor: pointer; }
.cat-option.selected { border-color: var(--violet); color: var(--white); background: rgba(106,0,255,0.2); }
.btn-submit { width: 100%; background: linear-gradient(135deg, var(--violet), var(--rose)); border: none; color: white; padding: 16px; border-radius: 16px; font-weight: 700; cursor: pointer; }

.cookie-banner { position: fixed; bottom: -100px; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--violet); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 900; transition: bottom 0.5s; font-size: 0.8rem; }
.cookie-banner.show { bottom: 0; }
.cookie-btn { background: var(--white); color: var(--bg); border: none; padding: 8px 16px; border-radius: 50px; font-weight: bold; cursor: pointer; }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg3); border: 1px solid rgba(106,0,255,0.4); border-radius: 50px; padding: 12px 24px; font-size: 0.82rem; color: var(--white); z-index: 1000; transition: transform 0.4s; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* LOADING INFINITE SCROLL */
.infinite-loader { display: none; text-align: center; padding: 20px; color: var(--muted); font-family: var(--font-mono); font-size: 0.8rem; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="logo">Secret<span>Zone</span></div>
  <div class="header-actions">
    <button class="btn-premium" onclick="triggerPremium()">⚡ Premium</button>
    <button class="btn-confess" onclick="openModal('confessModal')">+ Confesser</button>
  </div>
</header>

<section class="hero">
  <p class="hero-eyebrow">▲ 100% Anonyme • Sans filtre</p>
  <h1>Les secrets que<br>personne <em>n'ose</em><br>dire…</h1>
</section>

<!-- RECHERCHE ET TRI -->
<div class="toolbar">
  <input type="text" class="search-bar" id="searchInput" placeholder="Rechercher un mot (ex: mariage, amour)..." onkeyup="applyFilters()">
  <select class="sort-select" id="sortSelect" onchange="applyFilters()">
    <option value="recent">⏱️ Plus récents</option>
    <option value="popular">🔥 Plus populaires</option>
  </select>
</div>

<div class="categories" id="categories">
  <button class="cat-btn active" onclick="filterCat(this,'tous')">🌐 Tous</button>
  <button class="cat-btn" onclick="filterCat(this,'amour')">❤️ Amour</button>
  <button class="cat-btn" onclick="filterCat(this,'dark')">🖤 Dark</button>
  <button class="cat-btn" onclick="filterCat(this,'drole')">😂 Drôle</button>
  <button class="cat-btn" onclick="filterCat(this,'18+')">🔞 Caché (Premium)</button>
</div>

<div class="confessions-feed" id="feed"></div>
<div class="infinite-loader" id="infiniteLoader">Chargement des confessions...</div>

<!-- MODAL CONFESSION -->
<div class="modal-overlay" id="confessModal" onclick="closeModalIfBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 style="margin-bottom:10px;">Ta Confession</h2>
    <div class="form-group">
      <textarea class="form-textarea" id="confessionText" placeholder="Aujourd'hui j'ai réalisé que..." maxlength="500"></textarea>
    </div>
    <div class="form-group">
      <div class="cat-select" id="catSelect">
        <button class="cat-option" onclick="selectCat(this,'amour')">❤️ Amour</button>
        <button class="cat-option" onclick="selectCat(this,'dark')">🖤 Dark</button>
        <button class="cat-option" onclick="selectCat(this,'drole')">😂 Drôle</button>
        <button class="cat-option" onclick="selectCat(this,'18+')">🔞 +18 ans</button>
      </div>
    </div>
    <button class="btn-submit" onclick="submitConfession()">🔒 Confesser Anonymement</button>
  </div>
</div>

<!-- BANNIERE COOKIE (LÉGAL) -->
<div class="cookie-banner" id="cookieBanner">
  <span>🍪 Nous utilisons des cookies locaux pour mémoriser tes likes et votes anonymement.</span>
  <button class="cookie-btn" onclick="acceptCookies()">J'accepte</button>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================================================
// 2. GESTION DES UTILISATEURS (LocalStorage / Anonymat)
// =====================================================
let userData = JSON.parse(localStorage.getItem('sz_user')) || {
  liked: [], voted: {}, reported: [], isPremium: false, lastPostTime: 0, cookiesAccepted: false
};
function saveUser() { localStorage.setItem('sz_user', JSON.stringify(userData)); }

if (!userData.cookiesAccepted) {
  setTimeout(() => document.getElementById('cookieBanner').classList.add('show'), 1500);
}
function acceptCookies() {
  userData.cookiesAccepted = true; saveUser();
  document.getElementById('cookieBanner').classList.remove('show');
}

// =====================================================
// BASE DE DONNÉES (Simulée avec des Vrais Timestamps)
// =====================================================
const now = Date.now();
const confessionsData = [
  { id: 101, text: "Je sors avec un homme marié qui vit aux USA. Depuis le Ramadan il ne me parle plus...", category: 'amour', avatar: '🌹', name: 'Anonyme_DK', timestamp: now - 3600000, likes: 5142, comments: [], votes: { right: 412, wrong: 4102 } },
  { id: 102, text: "J'ai mon Bac+2 mais je vis chez une amie car ma mère a refusé que je divorce de mon mariage arrangé...", category: 'dark', avatar: '📚', name: 'Anonyme_SN', timestamp: now - 7200000, likes: 8903, comments: [], votes: { right: 8201, wrong: 143 } },
  { id: 103, text: "J'ai fait pipi au lit et j'ai accusé ma femme. Elle a pleuré et a appelé sa mère. J'ai trop honte.", category: 'drole', avatar: '😳', name: 'Anonyme_221', timestamp: now - 1800000, likes: 12480, comments: [], votes: { right: 234, wrong: 11890 } },
  { id: 104, text: "J'ai menti sur mon CV pour avoir ce job de Directeur. Ça fait 2 ans, personne ne sait que je n'ai pas le bac.", category: 'dark', avatar: '💼', name: 'Anonyme_Boss', timestamp: now - 86400000, likes: 320, comments: [], votes: { right: 120, wrong: 400 } },
  // Contenu Premium (18+)
  { id: 105, text: "Je suis tombée amoureuse de mon beau-frère. Hier soir, quand ma soeur dormait, on a franchi la limite...", category: '18+', avatar: '🔥', name: 'Anonyme_XX', timestamp: now - 900000, likes: 9800, comments: [], votes: { right: 12, wrong: 5000 } }
];

let currentFilter = 'tous';
let displayedCount = 0;
const chunk = 3; // Défilement infini : charge 3 par 3

// 5. UX : TEMPS DYNAMIQUE
function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return "à l'instant";
  if (diff < 3600) return Math.floor(diff/60) + " min";
  if (diff < 86400) return Math.floor(diff/3600) + "h";
  return Math.floor(diff/86400) + " jours";
}

// =====================================================
// RENDU ET FILTRES (Recherche & Tri)
// =====================================================
function applyFilters(resetLimit = true) {
  if(resetLimit) displayedCount = 0;
  
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  
  let filtered = confessionsData.filter(c => {
    if(userData.reported.includes(c.id)) return false; // Cache les signalés
    const matchCat = currentFilter === 'tous' || c.category === currentFilter;
    const matchSearch = c.text.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });

  if (sort === 'recent') filtered.sort((a, b) => b.timestamp - a.timestamp);
  if (sort === 'popular') filtered.sort((a, b) => b.likes - a.likes);

  if(resetLimit) document.getElementById('feed').innerHTML = '';
  
  const toDisplay = filtered.slice(displayedCount, displayedCount + chunk);
  toDisplay.forEach(c => document.getElementById('feed').appendChild(createCard(c)));
  
  displayedCount += chunk;
  document.getElementById('infiniteLoader').style.display = displayedCount < filtered.length ? 'block' : 'none';
}

function createCard(c) {
  const div = document.createElement('div');
  div.className = 'confession-card';
  div.dataset.id = c.id;
  
  const isLiked = userData.liked.includes(c.id);
  const userVote = userData.voted[c.id];
  const safeText = c.text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  
  // 4. PREMIUM : Logique de floutage
  let contentHTML = `<div class="confession-text">${safeText}</div>`;
  if (c.category === '18+' && !userData.isPremium) {
    contentHTML = `
      <div style="position:relative;">
        <div class="confession-text blurred-content">${safeText.substring(0, 50)}... [CONTENU CACHÉ]</div>
        <div class="locked-overlay">
          <span>🔞</span>
          <button onclick="triggerPremium()">Débloquer (Premium)</button>
        </div>
      </div>`;
  }

  div.innerHTML = `
    <div class="card-header">
      <div class="card-meta">
        <div class="anon-avatar" style="background:var(--muted2)">${c.avatar}</div>
        <div class="anon-info">
          <span class="anon-name">${c.name}</span>
          <span class="anon-time">${timeAgo(c.timestamp)}</span>
        </div>
      </div>
      <div class="card-category cat-${c.category.replace('+','')}">${c.category}</div>
    </div>
    
    ${contentHTML}

    <div class="vote-section">
      <span class="vote-question">Raison ou tort ?</span>
      <button class="vote-btn vote-right ${userVote==='right'?'voted':''}" onclick="vote(${c.id}, 'right')">✅ (${c.votes.right})</button>
      <button class="vote-btn vote-wrong ${userVote==='wrong'?'voted':''}" onclick="vote(${c.id}, 'wrong')">❌ (${c.votes.wrong})</button>
    </div>

    <div class="card-actions">
      <button class="action-btn ${isLiked?'liked':''}" onclick="toggleLike(${c.id}, this)">❤️ <span class="btn-count">${c.likes}</span></button>
      <button class="action-btn" onclick="shareWA('${encodeURIComponent(c.text.substring(0,100))}')">📤 Partager</button>
      <button class="btn-report" onclick="reportPost(${c.id})">⚠️ Signaler</button>
    </div>
  `;
  return div;
}

// 5. DÉFILEMENT INFINI (Infinite Scroll)
window.addEventListener('scroll', () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    if(document.getElementById('infiniteLoader').style.display === 'block') {
      applyFilters(false);
    }
  }
});

// =====================================================
// ACTIONS : LIKES, VOTES & MODÉRATION
// =====================================================
function toggleLike(id, btn) {
  const c = confessionsData.find(x => x.id === id);
  if (!c) return;
  const count = btn.querySelector('.btn-count');
  
  if (userData.liked.includes(id)) {
    userData.liked = userData.liked.filter(x => x !== id);
    c.likes--; btn.classList.remove('liked');
  } else {
    userData.liked.push(id);
    c.likes++; btn.classList.add('liked');
  }
  count.textContent = c.likes;
  saveUser();
}

function vote(id, side) {
  if (userData.voted[id]) { showToast('Tu as déjà voté !'); return; }
  
  const c = confessionsData.find(x => x.id === id);
  c.votes[side]++;
  userData.voted[id] = side;
  saveUser();
  applyFilters(true); // Re-rend pour mettre à jour les boutons
  showToast(side === 'right' ? '✅ Vote enregistré' : '❌ Vote enregistré');
}

// 2. SÉCURITÉ : SIGNALEMENT
function reportPost(id) {
  if(confirm("Signaler ce contenu pour propos inappropriés ou dangereux ?")) {
    userData.reported.push(id);
    saveUser();
    applyFilters(true); // Fait disparaître le post de l'écran
    showToast('⚠️ Contenu signalé et masqué. Merci.');
  }
}

// 2. SÉCURITÉ : ANTI-SPAM CONFESSION
let selectedCategory = '';
function selectCat(btn, cat) { 
  document.querySelectorAll('.cat-option').forEach(b => b.classList.remove('selected')); 
  btn.classList.add('selected'); selectedCategory = cat; 
}

function submitConfession() {
  // Rate Limiting : 1 minute
  if (Date.now() - userData.lastPostTime < 60000) {
    showToast('⏳ Attends 1 minute avant de publier à nouveau (Anti-spam).');
    return;
  }

  const text = document.getElementById('confessionText').value.trim();
  if (!text || !selectedCategory) { showToast('⚠️ Remplis tout !'); return; }
  
  confessionsData.unshift({
    id: Date.now(), text: text, category: selectedCategory, avatar: '👤', name: 'Anonyme', timestamp: Date.now(), likes: 0, comments: [], votes: { right:0, wrong:0 }
  });

  userData.lastPostTime = Date.now();
  saveUser();
  
  document.getElementById('confessionText').value = '';
  document.getElementById('confessModal').classList.remove('open');
  applyFilters(true);
  showToast('🔒 Confession en ligne !');
}

// =====================================================
// 4. PREMIUM ET MONÉTISATION
// =====================================================
function triggerPremium() {
  if(userData.isPremium) {
    showToast('Tu es déjà membre Premium ⚡'); return;
  }
  // Simulation de la passerelle de paiement (PayDunya, Stripe, etc.)
  if(confirm("Simulation Paiement : Veux-tu payer 2500 FCFA pour débloquer le contenu 🔞 et enlever les pubs ?")) {
    userData.isPremium = true;
    saveUser();
    applyFilters(true); // Re-rend l'écran (défloute les posts 18+)
    document.querySelector('.btn-premium').textContent = '⚡ Premium Actif';
    showToast('🎉 Bienvenue dans le club Premium !');
  }
}

// UTILS
function filterCat(btn, cat) { document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = cat; applyFilters(); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModalIfBg(e) { if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open'); }
function shareWA(enc) { window.open('https://wa.me/?text=' + enc + '%0A%0A👉%20Lu%20sur%20secretzone.app', '_blank'); }

let toastTimeout;
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toastTimeout); toastTimeout = setTimeout(() => t.classList.remove('show'), 2800); }

// INIT
if(userData.isPremium) document.querySelector('.btn-premium').textContent = '⚡ Premium Actif';
applyFilters();
</script>
</body>
</html>
